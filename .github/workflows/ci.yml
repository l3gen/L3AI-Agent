name: Levatas Demo CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/levatas-demo

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Smoke & Regression Tests
  # ─────────────────────────────────────────
  test:
    name: Smoke & Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start all services
        run: |
          docker compose up --build -d
          sleep 15

      - name: Wait for services to be healthy
        run: |
          for port in 5010 5011 5012; do
            for i in $(seq 1 10); do
              curl -sf http://localhost:$port/health && break
              echo "Waiting for port $port... attempt $i"
              sleep 3
            done
          done

      - name: Run smoke tests
        run: bash tests/smoke-test.sh

      - name: Run regression tests
        run: node tests/regression.js

      - name: Tear down
        if: always()
        run: docker compose down

  # ─────────────────────────────────────────
  # JOB 2: Security Scan (Trivy)
  # ─────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: docker compose build

      - name: Scan ingestion-api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-demo-ingestion-api
          format: sarif
          output: trivy-ingestion.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Scan ai-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-demo-ai-service
          format: sarif
          output: trivy-ai.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-ingestion.sarif

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Images
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push all services
        run: |
          for service in ingestion-api ai-service review-service dashboard; do
            docker build \
              -t ${{ env.IMAGE_PREFIX }}-${service}:${{ steps.tag.outputs.TAG }} \
              -t ${{ env.IMAGE_PREFIX }}-${service}:latest \
              ./${service}
            docker push ${{ env.IMAGE_PREFIX }}-${service}:${{ steps.tag.outputs.TAG }}
            docker push ${{ env.IMAGE_PREFIX }}-${service}:latest
          done

      - name: Save release tag
        run: echo "${{ steps.tag.outputs.TAG }}" > release.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: release.txt
