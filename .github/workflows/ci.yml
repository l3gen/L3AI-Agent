name: Levatas Demo CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/levatas-demo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Secret Scanning
  # Blocks everything — leaked secrets must never reach main.
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # exit-code defaults to 1 on leak found — this job will fail the PR

  # ─────────────────────────────────────────
  # JOB 2: SAST & Dependency Audit
  # Static analysis catches insecure code patterns before runtime.
  # ─────────────────────────────────────────
  sast:
    name: SAST & Dependency Audit
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Semgrep SAST ──────────────────────────────────────────────────────
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/python
            p/docker
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        # Semgrep exits non-zero on findings — fails the job
        continue-on-error: false

      # ── Node.js dependency audit ──────────────────────────────────────────
      - name: npm audit — ingestion-api
        working-directory: ingestion-api
        run: npm ci --prefer-offline && npm audit --audit-level=high

      - name: npm audit — review-service
        working-directory: review-service
        run: npm ci --prefer-offline && npm audit --audit-level=high

      - name: npm audit — dashboard
        working-directory: dashboard
        run: npm ci --prefer-offline && npm audit --audit-level=high

      # ── Python dependency audit ───────────────────────────────────────────
      - name: pip-audit — ai-service
        working-directory: ai-service
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt

  # ─────────────────────────────────────────
  # JOB 3: Smoke & Regression Tests
  # ─────────────────────────────────────────
  test:
    name: Smoke & Regression Tests
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start all services
        run: |
          docker compose -p levatas-demo up --build -d
          sleep 20

      - name: Wait for services to be healthy
        run: |
          for port in 5010 5011 5012; do
            for i in $(seq 1 15); do
              curl -sf http://localhost:$port/health && break
              echo "Waiting for port $port... attempt $i"
              sleep 3
            done
          done

      - name: Run smoke tests
        run: bash tests/smoke-test.sh

      - name: Run regression tests
        run: node tests/regression.js

      - name: Tear down
        if: always()
        run: docker compose -p levatas-demo down

  # ─────────────────────────────────────────
  # JOB 4: Container Image Security Scan (Trivy)
  # ALL images scanned. CRITICAL/HIGH findings block the build.
  # ─────────────────────────────────────────
  security-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all images
        run: |
          docker build -t levatas-ingestion-api:latest  ./ingestion-api
          docker build -t levatas-ai-service:latest     ./ai-service
          docker build -t levatas-review-service:latest ./review-service
          docker build -t levatas-dashboard:latest      ./dashboard

      # ── ingestion-api ─────────────────────────────────────────────────────
      # Raw shell scan — prints the CVE table directly to logs so we can see exactly what's failing.
      - name: Scan ingestion-api (table output for visibility)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --format table --severity CRITICAL,HIGH --ignore-unfixed levatas-ingestion-api:latest || true

      - name: Scan ingestion-api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-ingestion-api:latest
          format: sarif
          output: trivy-ingestion.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true     # only block on vulns that have a fix available

      # ── ai-service ────────────────────────────────────────────────────────
      - name: Scan ai-service (table output for visibility)
        run: trivy image --format table --severity CRITICAL,HIGH --ignore-unfixed levatas-ai-service:latest || true

      - name: Scan ai-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-ai-service:latest
          format: sarif
          output: trivy-ai.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # ── review-service (was missing) ──────────────────────────────────────
      - name: Scan review-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-review-service:latest
          format: sarif
          output: trivy-review.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # ── dashboard ─────────────────────────────────────────────────────────
      - name: Scan dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: levatas-dashboard:latest
          format: sarif
          output: trivy-dashboard.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload all SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: '.'      # uploads all *.sarif files in the repo root

  # ─────────────────────────────────────────
  # JOB 5: Build & Push Images
  # Only runs on main, only after all security gates pass.
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write    # needed for Cosign keyless signing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build, push, and sign all services
        run: |
          for service in ingestion-api ai-service review-service dashboard; do
            FULL_TAG="${{ env.IMAGE_PREFIX }}-${service}:${{ steps.tag.outputs.TAG }}"

            docker build \
              -t "${FULL_TAG}" \
              -t "${{ env.IMAGE_PREFIX }}-${service}:latest" \
              ./${service}

            docker push "${FULL_TAG}"
            docker push "${{ env.IMAGE_PREFIX }}-${service}:latest"

            # Sign the image — verifiable proof it came from this pipeline
            cosign sign --yes "${FULL_TAG}"
          done

      - name: Save release tag
        run: echo "${{ steps.tag.outputs.TAG }}" > release.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tag
          path: release.txt
