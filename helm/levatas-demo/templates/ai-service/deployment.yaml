apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.aiService.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.aiService.name }}
    {{- include "levatas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.aiService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.aiService.name }}
    spec:
      containers:
        - name: {{ .Values.aiService.name }}
          image: {{ include "levatas.image" (dict "image" .Values.aiService.image "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.aiService.port }}
          env:
            - name: PORT
              value: {{ .Values.aiService.port | quote }}
            {{- if .Values.aiService.gpu.enabled }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            {{- end }}
          {{- include "levatas.readinessProbe" (dict "port" .Values.aiService.port) | nindent 10 }}
          {{- include "levatas.livenessProbe"  (dict "port" .Values.aiService.port) | nindent 10 }}
          resources:
            {{- toYaml .Values.aiService.resources | nindent 12 }}
          {{- if .Values.aiService.gpu.enabled }}
          runtimeClassName: nvidia
          {{- end }}
