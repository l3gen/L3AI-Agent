apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.ingestionApi.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.ingestionApi.name }}
    {{- include "levatas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingestionApi.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.ingestionApi.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.ingestionApi.name }}
    spec:
      containers:
        - name: {{ .Values.ingestionApi.name }}
          image: {{ include "levatas.image" (dict "image" .Values.ingestionApi.image "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ingestionApi.port }}
          env:
            - name: PORT
              value: {{ .Values.ingestionApi.port | quote }}
            - name: AI_SERVICE_URL
              value: "http://{{ .Values.aiService.name }}:{{ .Values.aiService.port }}"
            - name: REVIEW_SERVICE_URL
              value: "http://{{ .Values.reviewService.name }}:{{ .Values.reviewService.port }}"
            - name: CONFIDENCE_THRESHOLD
              value: {{ .Values.ai.confidenceThreshold | quote }}
          {{- include "levatas.readinessProbe" (dict "port" .Values.ingestionApi.port) | nindent 10 }}
          {{- include "levatas.livenessProbe"  (dict "port" .Values.ingestionApi.port) | nindent 10 }}
          resources:
            {{- toYaml .Values.ingestionApi.resources | nindent 12 }}
