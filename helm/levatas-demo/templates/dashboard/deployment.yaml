apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.dashboard.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.dashboard.name }}
    {{- include "levatas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.dashboard.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.dashboard.name }}
    spec:
      containers:
        - name: {{ .Values.dashboard.name }}
          image: {{ include "levatas.image" (dict "image" .Values.dashboard.image "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          env:
            - name: VITE_INGESTION_URL
              value: "http://{{ .Values.ingestionApi.name }}:{{ .Values.ingestionApi.port }}"
            - name: VITE_REVIEW_URL
              value: "http://{{ .Values.reviewService.name }}:{{ .Values.reviewService.port }}"
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
