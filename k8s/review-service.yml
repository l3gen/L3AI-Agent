apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: levatas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
        - name: review-service
          image: levatas-review-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: levatas
spec:
  selector:
    app: review-service
  ports:
    - port: 5002
      targetPort: 5002
