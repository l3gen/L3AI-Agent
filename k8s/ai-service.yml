apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: levatas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: levatas-ai-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: levatas
spec:
  selector:
    app: ai-service
  ports:
    - port: 5001
      targetPort: 5001
